<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpSolve - Create Flash Card</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/create_card.css}" href="css/create_card.css">
    <link rel="stylesheet" href="codemirror/lib/codemirror.css"/>
    <script src="codemirror/lib/codemirror.js"></script>
    <script src="codemirror/mode/clike/clike.js"></script>
</head>
<body>
    <!-- navbar -->
    <nav id="create-navbar">
        <div id="create-navbar-container">

            <a id="create-navbar-brand" href="/dashboard">UpSolve</a>

            <div id="create-navbar-right">
                <div id="account-logo">
                    <img th:src="@{/img/account_circle.svg}" src="img/account_circle.svg" id="account-icon" width="39" height="36" alt="Account"/>
                    <div id="account-dropdown">
                        <div id="dropdown-username">
                            <span th:text="${user.userName}">username</span>
                            <span id="dropdown-role" th:text="${user.userRole}">User</span>
                        </div>
                        <a id="dropdown-logout" href="/logout">
                            <i class="bi bi-box-arrow-right"></i> Log Out
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </nav>
    <!-- body -->
    <main id="create-main">

        <div id="create-container">
            <div id="create-card">

                <div id="create-header">
                    <h1 id="create-title">Create Flash Card</h1>
                    <p id="create-subtitle">Design a programming problem flashcard with a solution</p>
                </div>

                <form id="create-form" th:action="@{/problems/new}" action="/problems/new" method="post">

                    <!-- problem name -->
                    <div id="field-name" class="create-field">
                        <label id="label-name" for="problemName" class="create-label">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                            </svg>
                            Problem Name
                        </label>
                        <input type="text" id="problemName" name="problemName"
                               class="create-input"
                               placeholder="e.g., Two-Sum, Reverse a Linked List..."
                               required>
                    </div>

                    <!-- problem statement -->
                    <div id="field-description" class="create-field">
                        <label id="label-description" for="problemDescription" class="create-label">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="16 18 22 12 16 6"></polyline>
                                <polyline points="8 6 2 12 8 18"></polyline>
                            </svg>
                            Problem Statement
                        </label>
                        <textarea id="problemDescription" name="problemDescription"
                                  class="create-input create-textarea"
                                  placeholder="e.g., Write a function to reverse a string without using built-in methods..."
                                  rows="4" required></textarea>
                    </div>

                    <!-- solution code -->
                    <div id="field-solution" class="create-field">
                        <label id="label-solution" for="problemSolution" class="create-label">
                            Solution / Code
                        </label>

                        <textarea id="problemSolution" name="problemSolution"
                                  class="create-input create-textarea create-code"
                                  placeholder="Write your solution here..."
                                  rows="8"></textarea>
                    </div>

                    <!-- difficulty -->
                    <div id="field-difficulty" class="create-field">
                        <label id="label-difficulty" class="create-label">Difficulty Level</label>
                        <input type="hidden" id="problemDifficulty" name="problemDifficulty" value="2">
                        <div id="difficulty-buttons">
                            <button type="button" id="btn-easy"   class="difficulty-btn" data-value="1">Easy</button>
                            <button type="button" id="btn-medium" class="difficulty-btn active-medium" data-value="2">Medium</button>
                            <button type="button" id="btn-hard"   class="difficulty-btn" data-value="3">Hard</button>
                        </div>
                    </div>

                    <div th:if="${errorMessage}" class="error-message">
                         <p th:text="${errorMessage}"></p>
                    </div>

                    <div id="create-actions">
                        <a id="btn-cancel" th:href="${user.userRole == 'ADMIN'} ? @{/admin_dashboard} : @{/dashboard}">Cancel</a>
                        <button type="submit" id="btn-save">Save Card</button>
                    </div>

                </form>
            </div>
        </div>

    </main>
    <script>
		var editor = CodeMirror.fromTextArea(document.getElementById("problemSolution"), {
			lineNumbers: true,
			mode: "text/x-c++src",
			theme: "monokai",
            value: `#include <bits/stdc++.h>`});	
	</script>
	
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/account-dropdown.js}" src="js/account-dropdown.js"></script>
    <script th:src="@{/js/create_card.js}" src="js/create_card.js"></script>
</body>
</html>
